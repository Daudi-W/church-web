<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>服事系統（測試沙盒）— 登入驗證</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    margin: 0; background: #f4f6f8; color: #1f2d3d;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: #fff; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,.08);
    max-width: 460px; width: 100%; padding: 32px;
  }
  .badge {
    display: inline-block; background: #fff4e5; color: #b26a00;
    font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; margin-bottom: 14px;
  }
  h1 { font-size: 20px; margin: 0 0 6px; }
  .sub { color: #6b7a8d; font-size: 14px; margin: 0 0 22px; line-height: 1.6; }
  #gBtn { display: flex; justify-content: center; margin: 18px 0; }
  #status { font-size: 14px; min-height: 22px; text-align: center; margin-top: 6px; }
  .result {
    margin-top: 18px; background: #f0f7ff; border: 1px solid #cfe6ff; border-radius: 12px;
    padding: 16px; font-size: 14px; line-height: 1.9; display: none;
  }
  .result.show { display: block; }
  .result .ok { color: #1a7f37; font-weight: 700; }
  .result code { background: #e7eef5; padding: 1px 6px; border-radius: 5px; font-size: 13px; }
  .err { color: #c0392b; }
  .svc-title { margin-top: 14px; font-weight: 700; font-size: 14px; }
  .svc-empty { color: #6b7a8d; font-size: 13px; margin-top: 4px; }
  table.svc { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  table.svc th, table.svc td { border: 1px solid #cfe6ff; padding: 5px 8px; text-align: left; }
  table.svc th { background: #dceeff; }
  .mbr { margin-top: 8px; padding: 8px 10px; background: #f7faff; border: 1px solid #e1ecf7; border-radius: 8px; font-size: 13px; }
  .mbr-none { color: #8a97a4; }
  .mbr-svc { color: #34465a; padding-left: 10px; margin-top: 2px; }
  .zone-h { margin-top: 18px; font-weight: 700; font-size: 15px; color: #1f4e79; border-top: 2px solid #cfe6ff; padding-top: 12px; }
  .grp-h { margin-top: 12px; font-weight: 700; font-size: 13px; color: #6a4b9e; background: #f3edff; padding: 4px 8px; border-radius: 6px; }
  .toggle { margin-top: 14px; display: flex; gap: 8px; }
  .toggle button { flex: 1; padding: 8px; border: 1px solid #cfe6ff; background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .toggle button.on { background: #2563eb; color: #fff; border-color: #2563eb; }
  .wk-date { margin-top: 12px; font-weight: 700; font-size: 14px; color: #1f4e79; }
  .wk-ses { font-size: 13px; padding: 3px 0 3px 12px; color: #34465a; }
  .wk-ses-h { display: inline-block; min-width: 48px; color: #6a4b9e; font-weight: 700; }
  .sp { color: #b26a00; font-size: 12px; }
  .slot { cursor: pointer; border-radius: 6px; }
  .slot:hover { background: #eef5ff; }
  .slot .edit { color: #2563eb; font-size: 11px; opacity: .6; }
  .pk-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
  .pk-panel { background: #fff; border-radius: 14px; max-width: 440px; width: 100%; max-height: 80vh; overflow: auto; padding: 18px; position: relative; }
  .pk-close { position: absolute; top: 10px; right: 12px; border: none; background: none; font-size: 18px; cursor: pointer; color: #888; }
  .pk-h { font-weight: 700; font-size: 15px; color: #1f4e79; margin-bottom: 10px; }
  .pk-cur { margin-bottom: 10px; font-size: 13px; }
  .chip { display: inline-block; background: #eef2ff; border-radius: 999px; padding: 2px 8px; margin: 2px; }
  .chip a { color: #c0392b; cursor: pointer; margin-left: 2px; }
  .pk-skill { font-weight: 700; font-size: 13px; color: #6a4b9e; margin-top: 10px; }
  .pk-cands { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .cand { padding: 7px 12px; border: 1px solid #2563eb; background: #fff; color: #2563eb; border-radius: 999px; cursor: pointer; font-size: 14px; }
  .cand:hover { background: #2563eb; color: #fff; }
  .cand.sameday { border-color: #b45309; color: #b45309; }
  .cand.sameday:hover { background: #b45309; color: #fff; }
  .foot { margin-top: 22px; font-size: 12px; color: #9aa7b4; line-height: 1.7; }
  button.logout {
    margin-top: 14px; width: 100%; padding: 10px; border: 1px solid #d0d7de; background: #fff;
    border-radius: 10px; cursor: pointer; font-size: 14px; color: #444;
  }
</style>
</head>
<body>
<div class="card">
  <span class="badge">🧪 測試沙盒・不影響正式系統</span>
  <h1>服事系統 — 登入驗證</h1>
  <p class="sub">用你的 Google 帳號登入，系統會驗證身分（不能冒名）並讀取<strong>隔離的測試試算表</strong>，把結果顯示在下方。這是環節 2 的驗收頁。</p>

  <div id="gBtn"></div>
  <div id="status">請點上方按鈕，用 Google 登入</div>

  <div class="result" id="result"></div>
  <button class="logout" id="logoutBtn" style="display:none" onclick="logout()">登出 / 換帳號</button>

  <p class="foot">
    後端：service-app 測試 GAS ・ 資料：測試沙盒試算表（複製自正式）<br>
    登入只做身分驗票，唯讀，不寫入任何資料。
  </p>
</div>

<div id="picker" class="pk-overlay" style="display:none" onclick="if(event.target===this)closePicker()">
  <div class="pk-panel"><button class="pk-close" onclick="closePicker()">✕</button><div class="pk-body"></div></div>
</div>

<script>
  // 測試沙盒後端（service-app GAS 部署）
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxavwu853Lejoco68BOJ1hEiH6MSrXMe2do171i8uUbGtQxDYBrLqk5U07H6Qas96rAWQ/exec';
  // 沿用教會 church-login 的 OAuth 用戶端 ID（與場地/新人同一組）
  var CLIENT_ID = '1074124628352-lvvlgdr0vm4u35u48htt0ctg18n6ciju.apps.googleusercontent.com';
  var LAST_RES = null;
  var ID_TOKEN = null;
  var VIEW_MODE = 'card'; // 'card' | 'week'

  function initGoogleLogin() {
    if (!(window.google && google.accounts && google.accounts.id)) {
      return setTimeout(initGoogleLogin, 100);
    }
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onGoogleLogin, auto_select: false });
    google.accounts.id.renderButton(document.getElementById('gBtn'),
      { theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill' });
  }
  window.addEventListener('load', initGoogleLogin);

  function switchView(mode) { VIEW_MODE = mode; renderView(); }

  function renderView() {
    var res = LAST_RES; if (!res || !res.matched) return;
    var bc = document.getElementById('tgCard'), bw = document.getElementById('tgWeek');
    if (bc) bc.className = VIEW_MODE === 'card' ? 'on' : '';
    if (bw) bw.className = VIEW_MODE === 'week' ? 'on' : '';
    var h = '';
    if (VIEW_MODE === 'week') {
      h += renderWeek('📋 我未來的服事', myEntries(res));
      if (res.isLeader) h += renderWeek((res.scope === 'group' ? '👥 我的小組' : '👥 本區') + '同工 · 週視圖', zoneEntries(res));
    } else {
      h += renderServices(res.services);
      if (res.isLeader) h += renderZone(res.zone, res.zoneMembers, res.scope, res.group);
    }
    if (res.isTeamLead && res.teamLeads) {
      res.teamLeads.forEach(function (tl) { h += renderTeam(tl.teamName, tl.schedule); });
    }
    document.getElementById('viewArea').innerHTML = h;
  }

  function openPicker(row, col) {
    var p = document.getElementById('picker');
    p.style.display = 'flex';
    var b = p.querySelector('.pk-body');
    b.innerHTML = '查詢可排的人…';
    api('candidates', { row: row, col: col }).then(function (res) {
      if (!res.ok) { b.innerHTML = '⚠️ ' + (res.error || '無法取得'); return; }
      var h = '<div class="pk-h">' + res.date + '（' + res.weekday + '）' + (res.session || '') + ' · ' + res.role + '</div>';
      if (res.current && res.current.length) {
        h += '<div class="pk-cur">目前排：' + res.current.map(function (n) {
          return '<span class="chip">' + n + ' <a class="rm" data-name="' + n + '">✕</a></span>';
        }).join(' ') + '</div>';
      }
      Object.keys(res.candidatesBySkill).forEach(function (sk) {
        var list = res.candidatesBySkill[sk];
        h += '<div class="pk-skill">' + sk + '（' + list.length + ' 人可排）</div><div class="pk-cands">';
        if (!list.length) h += '<span class="svc-empty">沒有可排的人（都撞班/休息/請假/牧區限制）</span>';
        list.forEach(function (c) {
          h += '<button class="cand' + (c.sameDay ? ' sameday' : '') + '" data-name="' + c.name + '">' +
            c.name + (c.sameDay ? ' ⚠同日' : '') + '</button>';
        });
        h += '</div>';
      });
      b.innerHTML = h;
      // 用事件綁定（避免內嵌 onclick 的字串/引號問題）
      b.querySelectorAll('.cand').forEach(function (btn) {
        btn.addEventListener('click', function () { doAssign(row, col, btn.getAttribute('data-name')); });
      });
      b.querySelectorAll('.rm').forEach(function (a) {
        a.addEventListener('click', function () { doUnassign(row, col, a.getAttribute('data-name')); });
      });
    }).catch(function (e) { b.innerHTML = '⚠️ 連線失敗：' + e; });
  }
  function closePicker() { document.getElementById('picker').style.display = 'none'; }
  function doAssign(row, col, name) {
    var b = document.querySelector('#picker .pk-body'); if (b) b.innerHTML = '指派「' + name + '」中…';
    api('assign', { row: row, col: col, name: name }).then(function (res) {
      if (!res.ok) { alert('指派失敗：' + (res.error || '')); openPicker(row, col); return; }
      closePicker(); refresh();
    }).catch(function (e) { alert('連線失敗：' + e); });
  }
  function doUnassign(row, col, name) {
    if (!confirm('確定把「' + name + '」從這個崗位移除？')) return;
    api('unassign', { row: row, col: col, name: name }).then(function (res) {
      if (!res.ok) { alert('取消失敗：' + (res.error || '')); return; }
      closePicker(); refresh();
    }).catch(function (e) { alert('連線失敗：' + e); });
  }

  function renderTeam(teamName, sched) {
    var h = '<div class="zone-h">🛠 我的事工團（' + (teamName || '') + '）未來班表</div>';
    if (!sched || !sched.length) return h + '<div class="svc-empty">未來沒有這個團的排班欄位。</div>';
    var gaps = 0;
    sched.forEach(function (d) { d.slots.forEach(function (s) { if (s.empty) gaps++; }); });
    h += '<div class="svc-empty">未來 ' + sched.length + ' 個時段，' +
      (gaps ? '<span class="err">缺 ' + gaps + ' 個崗位</span>' : '目前皆有人') + '。</div>';
    sched.forEach(function (d) {
      h += '<div class="wk-date">📅 ' + d.date + '（' + d.weekday + '）' + (d.session || '') +
        (d.special ? ' <span class="sp">⟨' + d.special + '⟩</span>' : '') + '</div>';
      d.slots.forEach(function (s) {
        var content = s.empty ? '<span class="err">缺人</span>' : s.names.join('、');
        h += '<div class="wk-ses slot" onclick="openPicker(' + s.row + ',' + s.col + ')">' +
          '<span class="wk-ses-h">' + s.label + '</span> ' + content + ' <span class="edit">✎排班</span></div>';
      });
    });
    return h;
  }

  function myEntries(res) {
    return (res.services || []).map(function (s) {
      return { date: s.date, weekday: s.weekday, session: s.session, role: s.role, instrument: s.instrument, who: '我' };
    });
  }
  function zoneEntries(res) {
    var out = [];
    (res.zoneMembers || []).forEach(function (m) {
      (m.services || []).forEach(function (s) {
        out.push({ date: s.date, weekday: s.weekday, session: s.session, role: s.role, instrument: s.instrument, who: m.displayName });
      });
    });
    return out;
  }
  function dkey(d) { var p = String(d).split('/'); return (parseInt(p[0], 10) || 0) * 100 + (parseInt(p[1], 10) || 0); }

  function renderWeek(title, entries) {
    var h = '<div class="zone-h">' + title + '</div>';
    if (!entries.length) return h + '<div class="svc-empty">未來沒有排班。</div>';
    var byDate = {}, order = [];
    entries.forEach(function (e) {
      if (!byDate[e.date]) { byDate[e.date] = { weekday: e.weekday, sessions: {}, sorder: [] }; order.push(e.date); }
      var ses = e.session || '—';
      if (!byDate[e.date].sessions[ses]) { byDate[e.date].sessions[ses] = []; byDate[e.date].sorder.push(ses); }
      byDate[e.date].sessions[ses].push(e.who + ' · ' + e.role + (e.instrument ? '（' + e.instrument + '）' : ''));
    });
    order.sort(function (a, b) { return dkey(a) - dkey(b); });
    order.forEach(function (k) {
      var d = byDate[k];
      h += '<div class="wk-date">📅 ' + k + '（' + d.weekday + '）</div>';
      d.sorder.forEach(function (ses) {
        h += '<div class="wk-ses"><span class="wk-ses-h">' + ses + '</span> ' + d.sessions[ses].join('、') + '</div>';
      });
    });
    return h;
  }

  function svcLine(s) {
    return s.date + '(' + s.weekday + ') ' + (s.session || '') + ' ' + s.role + (s.instrument ? '（' + s.instrument + '）' : '');
  }

  function renderMember(m) {
    var label = m.displayName + (m.shepherdRole ? '・' + m.shepherdRole : '');
    if (m.services && m.services.length) {
      var items = m.services.map(function (s) { return '<div class="mbr-svc">' + svcLine(s) + '</div>'; }).join('');
      return '<div class="mbr"><b>' + label + '</b>（' + m.services.length + '）' + items + '</div>';
    }
    return '<div class="mbr mbr-none"><b>' + label + '</b>：未來無排班</div>';
  }

  function renderZone(zone, members, scope, myGroup) {
    var title = (scope === 'group') ? ('👥 我的小組（' + (myGroup || '—') + '）') : ('👥 本區（' + (zone || '—') + '）');
    if (!members || !members.length) {
      return '<div class="zone-h">' + title + '</div><div class="svc-empty">目前沒有可顯示的同工。</div>';
    }
    var withSvc = members.filter(function (m) { return m.services && m.services.length; }).length;
    var h = '<div class="zone-h">' + title + ' 同工的未來服事</div>';
    h += '<div class="svc-empty">共 ' + members.length + ' 位，' + withSvc + ' 位有排班。</div>';
    // 依小組分組
    var groups = {}, order = [];
    members.forEach(function (m) {
      var g = m.group || '（未分組）';
      if (!groups[g]) { groups[g] = []; order.push(g); }
      groups[g].push(m);
    });
    var hideGrpHdr = (scope === 'group') || (order.length === 1 && order[0] === '（未分組）');
    order.forEach(function (g) {
      if (!hideGrpHdr) h += '<div class="grp-h">📍 ' + g + '（' + groups[g].length + '）</div>';
      groups[g].forEach(function (m) { h += renderMember(m); });
    });
    return h;
  }

  function renderServices(list) {
    var h = '<div class="svc-title">📋 我未來的服事（' + (list ? list.length : 0) + '）</div>';
    if (!list || !list.length) {
      return h + '<div class="svc-empty">未來目前沒有排到你的服事（或服事表尚未排到）。</div>';
    }
    h += '<table class="svc"><tr><th>日期</th><th>堂次</th><th>崗位</th></tr>';
    list.forEach(function (s) {
      var role = s.role + (s.instrument ? '（' + s.instrument + '）' : '');
      h += '<tr><td>' + s.date + '（' + s.weekday + '）</td><td>' + (s.session || '—') + '</td><td>' + role + '</td></tr>';
    });
    h += '</table>';
    return h;
  }

  function setStatus(msg, isErr) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = isErr ? 'err' : '';
  }

  function api(action, args) {
    return fetch(SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      body: JSON.stringify({ action: action, idToken: ID_TOKEN, args: args || {} })
    }).then(function (r) { return r.json(); });
  }

  function onGoogleLogin(response) {
    ID_TOKEN = response.credential;
    setStatus('⏳ 驗證身分中…', false);
    api('whoami').then(applyResult).catch(function () { setStatus('⚠️ 連線失敗，請稍後再試', true); });
  }

  function refresh() { api('whoami').then(applyResult).catch(function () {}); }

  function applyResult(res) {
    if (!res.ok) { setStatus('⚠️ ' + (res.error || '驗證失敗'), true); return; }
    setStatus('✅ 登入成功', false);
    LAST_RES = res;
    var html = '<div class="ok">✅ 身分驗證通過（後端確認，非前端自報）</div>' +
      '登入 email：<code>' + res.email + '</code><br>';
    if (res.matched) {
      html += '姓名：<strong>' + (res.name || '—') + '</strong><br>' +
        '牧區：' + (res.zone || '—') + (res.group ? ' / ' + res.group : '') + '<br>' +
        '牧養身份：<strong>' + (res.shepherdRole || '—') + '</strong><br>' +
        '事工團：' + (res.team || '—') + (res.teamRole ? '（' + res.teamRole + '）' : '') + '<br>' +
        '可服事崗位：' + (res.skills || '—');
      html += '<div class="toggle"><button id="tgCard" onclick="switchView(\'card\')">🗂 卡片</button>' +
              '<button id="tgWeek" onclick="switchView(\'week\')">📅 週視圖</button></div>';
      html += '<div id="viewArea"></div>';
    } else {
      html += '<span class="err">⚠️ 查無身分</span>：' +
        (res.note ? res.note : '你已成功登入，但不在名單中（之後走「帳號申請」加入）');
    }
    var rd = document.getElementById('result');
    rd.innerHTML = html; rd.className = 'result show';
    document.getElementById('logoutBtn').style.display = 'block';
    if (res.matched) renderView();
  }

  function logout() {
    if (window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
    location.reload();
  }
</script>
</body>
</html>
