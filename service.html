<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>桃園教會服事平台</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
  :root {
    --tl-900: #04342C; --tl-800: #085041; --tl-600: #0F6E56;
    --tl-200: #5DCAA5; --tl-100: #9FE1CB; --tl-50: #E1F5EE;
    --ink: #1f2d3d; --mut: #6b7a8d; --hint: #9aa7b4;
    --bg: #f4f6f8; --line: #e3e9ef; --red: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 84px; }
  .badge {
    display: inline-block; background: #fff4e5; color: #b26a00;
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
  }
  /* 登入畫面 */
  .login-screen { display: flex; flex-direction: column; align-items: center; padding: 28px 16px 48px; }
  .bd-slot { border-top: 1px solid var(--line); padding: 10px 0 6px; }
  .bd-slot:first-child { border-top: none; padding-top: 4px; }
  .bd-d { font-size: 14px; font-weight: 700; color: var(--tl-800); }
  .bd-d .sp { color: #b26a00; font-size: 12px; font-weight: 400; }
  .bd-line { font-size: 13px; padding: 2px 0 2px 4px; color: #34465a; }
  .bd-line .rl { display: inline-block; min-width: 78px; color: var(--tl-600); font-weight: 700; }
  .card {
    background: #fff; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,.07);
    max-width: 420px; width: 100%; padding: 30px;
  }
  .card h1 { font-size: 20px; margin: 10px 0 6px; }
  .sub { color: var(--mut); font-size: 14px; margin: 0 0 20px; line-height: 1.6; }
  #gBtn { display: flex; justify-content: center; margin: 16px 0; }
  #status { font-size: 14px; min-height: 22px; text-align: center; color: var(--mut); }
  .err { color: var(--red); }
  .foot { margin-top: 18px; font-size: 12px; color: var(--hint); line-height: 1.7; }
  /* 主畫面 */
  .hdr { padding: 22px 2px 6px; }
  .hdr .d { font-size: 13px; color: var(--tl-600); font-weight: 700; }
  .hdr h1 { font-size: 22px; margin: 2px 0 0; }
  .hdr .badge { float: right; margin-top: 4px; }
  .hero {
    background: var(--tl-50); border-radius: 14px; padding: 16px; margin-top: 14px;
  }
  .hero .cap { font-size: 12px; color: var(--tl-600); font-weight: 700; }
  .hero .big { font-size: 18px; font-weight: 700; color: var(--tl-900); margin-top: 4px; }
  .hero .what { font-size: 15px; color: var(--tl-800); margin-top: 2px; }
  .hero.none { background: #fff; border: 1px dashed var(--tl-100); color: var(--mut); font-size: 14px; }
  .qa { display: flex; gap: 8px; margin-top: 10px; }
  .qa button {
    flex: 1; padding: 11px 0; font-size: 14px; border: 1px solid var(--tl-200);
    background: #fff; color: var(--tl-800); border-radius: 11px; cursor: pointer;
  }
  .qa button:active { background: var(--tl-50); }
  .sec { margin-top: 18px; }
  .sec-h { font-size: 13px; color: var(--hint); font-weight: 700; margin: 0 0 4px 2px; }
  .mon { font-size: 12px; color: var(--hint); font-weight: 700; margin: 12px 0 2px 2px; }
  .tl-row { display: flex; gap: 12px; align-items: center; padding: 7px 0; }
  .tl-date {
    width: 44px; min-width: 44px; text-align: center; background: #fff;
    border: 1px solid var(--line); border-radius: 10px; padding: 5px 0;
  }
  .tl-date b { display: block; font-size: 17px; line-height: 1.2; }
  .tl-date span { font-size: 10px; color: var(--hint); }
  .tl-date.hot { background: var(--tl-50); border-color: var(--tl-100); }
  .tl-date.hot b { color: var(--tl-800); }
  .tl-date.hot span { color: var(--tl-600); }
  .tl-txt { font-size: 14px; line-height: 1.5; }
  .tl-txt .who { color: var(--mut); }
  .tl-txt .sp { color: #b26a00; font-size: 12px; }
  .empty { color: var(--mut); font-size: 13px; padding: 8px 2px; }
  .panel { background: #fff; border-radius: 14px; padding: 14px 16px; margin-top: 12px; }
  .panel .ph { font-size: 15px; font-weight: 700; }
  .panel .ps { font-size: 12px; color: var(--mut); margin-top: 2px; }
  .gap-badge { display: inline-block; background: #fdecea; color: var(--red); font-size: 12px; font-weight: 700; padding: 1px 8px; border-radius: 999px; }
  .ok-badge { display: inline-block; background: var(--tl-50); color: var(--tl-600); font-size: 12px; font-weight: 700; padding: 1px 8px; border-radius: 999px; }
  .lead-tag { display: inline-block; background: #b26a00; color: #fff; font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
  .slot-line { font-size: 13px; padding: 3px 0 3px 2px; }
  .slot-line .lb { display: inline-block; min-width: 64px; color: var(--tl-600); font-weight: 700; }
  .grp-h { margin: 14px 0 4px; font-weight: 700; font-size: 13px; color: #6a4b9e; background: #f3edff; padding: 4px 10px; border-radius: 8px; }
  .mbr { background: #fff; border-radius: 12px; padding: 10px 12px; margin-top: 8px; font-size: 13px; }
  .mbr .nm { font-weight: 700; font-size: 14px; }
  .mbr .rl { color: var(--mut); font-size: 12px; margin-left: 6px; }
  .mbr .none { color: var(--hint); }
  .chips { margin-top: 4px; }
  .chip { display: inline-block; background: var(--bg); border-radius: 8px; padding: 3px 8px; margin: 2px 4px 2px 0; font-size: 12px; color: #34465a; }
  .toggle { display: flex; gap: 4px; background: #e9eef3; border-radius: 10px; padding: 3px; margin-top: 10px; }
  .toggle button { flex: 1; padding: 7px 0; font-size: 13px; border: none; background: transparent; border-radius: 8px; cursor: pointer; color: var(--mut); }
  .toggle button.on { background: #fff; color: var(--ink); font-weight: 700; }
  /* 我的 */
  .me-card { background: #fff; border-radius: 14px; padding: 18px 16px; margin-top: 14px; }
  .me-top { display: flex; align-items: center; gap: 12px; }
  .ava { width: 48px; height: 48px; border-radius: 50%; background: var(--tl-50); color: var(--tl-800); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }
  .me-top .nm { font-size: 17px; font-weight: 700; }
  .me-top .em { font-size: 12px; color: var(--mut); word-break: break-all; }
  .kv { display: flex; justify-content: space-between; gap: 10px; padding: 9px 2px; border-top: 1px solid var(--line); font-size: 14px; margin-top: 0; }
  .kv:first-of-type { margin-top: 12px; }
  .kv .k { color: var(--mut); white-space: nowrap; }
  .kv .v { text-align: right; }
  .btn { width: 100%; padding: 12px 0; font-size: 14px; border-radius: 11px; cursor: pointer; margin-top: 10px; border: 1px solid var(--tl-200); background: #fff; color: var(--tl-800); }
  .btn.line { border-color: #d0d7de; color: #555; }
  /* 底部分頁 */
  .tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; background: #fff;
    border-top: 1px solid var(--line); display: flex; padding: 6px 0 calc(8px + env(safe-area-inset-bottom));
    max-width: 480px; margin: 0 auto; border-radius: 16px 16px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,.05);
  }
  .tabbar button { flex: 1; border: none; background: none; cursor: pointer; font-size: 11px; color: var(--hint); padding: 4px 0; position: relative; }
  .nbadge { position: absolute; top: 0; left: 55%; background: #e24b4a; color: #fff; border-radius: 999px; font-size: 10px; font-weight: 700; padding: 1px 5px; line-height: 1.3; }
  .chg { display: inline-block; background: #fdf0dc; color: #b26a00; font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 6px; margin-left: 6px; }
  .nt { background: #fff; border-radius: 12px; padding: 10px 12px; margin-top: 8px; font-size: 13px; }
  .nt .t { color: var(--hint); font-size: 11px; margin-top: 2px; }
  .nt.new { border-left: 3px solid var(--tl-600); border-radius: 0 12px 12px 0; }
  .wkh { background: var(--tl-50); color: var(--tl-800); font-weight: 700; font-size: 13px; padding: 6px 10px; border-radius: 8px; margin: 12px 0 2px; }
  .wkh .rng { font-weight: 400; color: var(--tl-600); }
  i.ti { vertical-align: -2px; }
  .qa.qa-wrap { flex-wrap: wrap; }
  .qa.qa-wrap button { flex: 1 1 45%; }
  .links { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .lk { background: #fff; border-radius: 12px; padding: 12px; font-size: 13px; cursor: pointer; border: 1px solid var(--line); }
  .lk:hover { border-color: var(--tl-200); }
  .lk i { font-size: 20px; color: var(--tl-600); display: block; margin-bottom: 4px; }
  .noti-line { margin-top: 10px; background: #fff8ec; border: 1px solid #f3ddb5; color: #b26a00; font-size: 13px; font-weight: 700; padding: 10px 12px; border-radius: 11px; cursor: pointer; }
  .pub-links { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
  .pub-links a { font-size: 12px; color: var(--tl-800); border: 1px solid var(--tl-100); border-radius: 999px; padding: 5px 10px; text-decoration: none; }
  /* 長輩友善：整體字級放大 */
  .sub, .qa button, .tl-txt, .kv, .btn { font-size: 16px; }
  .hero .big { font-size: 21px; }
  .hero .what, .me-top .nm { font-size: 17px; }
  .hero .cap, .sec-h, .mon, .toggle button, .tabbar button { font-size: 13px; }
  .bd-d, .lk, .nt, .mbr, .slot-line, .bd-line, .hint-s, .lv-form label, .empty, .panel .ps { font-size: 15px; }
  .mbr .nm { font-size: 16px; }
  .tl-date b { font-size: 19px; }
  .tl-date span, .badge { font-size: 12px; }
  .chip, .pub-links a, .foot, .nt .t { font-size: 13px; }
  .pk-h { font-size: 18px; }
  .panel .ph { font-size: 17px; }
  .wkh { font-size: 15px; }
  .grp-h { font-size: 15px; }
  .lv-form select { padding: 9px; border: 1px solid #cfd8e3; border-radius: 9px; font-size: 16px; }
  .lv-form input { font-size: 16px; }
  .nt .go { color: var(--tl-600); font-size: 13px; font-weight: 700; }
  .br-tag { display: inline-block; background: #e8f0fe; color: #1a56db; font-size: 12px; font-weight: 700; padding: 1px 7px; border-radius: 6px; margin-left: 6px; }
  .embed-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; border-bottom: 1px solid var(--line); }
  .embed-bar button { border: 1px solid var(--tl-200); background: #fff; color: var(--tl-800); border-radius: 9px; padding: 8px 14px; font-size: 15px; cursor: pointer; }
  .embed-bar .et { font-weight: 700; font-size: 16px; }
  .embed-bar a { margin-left: auto; font-size: 14px; color: var(--tl-600); text-decoration: none; }
  /* 桌面版：左側導覽 + 加寬內容 */
  @media (min-width: 900px) {
    .wrap { max-width: 860px; padding: 0 24px 40px 150px; }
    .tabbar {
      left: calc(50% - 430px); right: auto; top: 110px; bottom: auto;
      width: 100px; max-width: none; margin: 0; flex-direction: column; gap: 2px;
      border: 1px solid var(--line); border-top: 1px solid var(--line);
      border-radius: 16px; padding: 12px 0; box-shadow: 0 8px 30px rgba(0,0,0,.06);
    }
    .tabbar button { flex: none; padding: 10px 0; font-size: 12px; }
    .tabbar button .ic { font-size: 22px; }
    .nbadge { left: 58%; top: 4px; }
    .hdr { padding-top: 30px; }
    .login-screen { flex-direction: row; align-items: flex-start; justify-content: center; gap: 20px; padding-top: 48px; }
    .login-screen .card { margin-top: 0; }
    #boardCard { margin-top: 0 !important; max-width: 460px; }
  }
  .tabbar button .ic { display: block; font-size: 20px; margin-bottom: 1px; }
  .tabbar button.on { color: var(--tl-600); font-weight: 700; }
  /* 彈窗 */
  .pk-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
  .pk-panel { background: #fff; border-radius: 16px; max-width: 420px; width: 100%; max-height: 82vh; overflow: auto; padding: 20px; position: relative; }
  .pk-close { position: absolute; top: 10px; right: 12px; border: none; background: none; font-size: 18px; cursor: pointer; color: #888; }
  .pk-h { font-weight: 700; font-size: 16px; margin-bottom: 10px; }
  .pk-btns { display: flex; gap: 8px; margin-top: 12px; }
  .pk-btns button { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--tl-600); background: var(--tl-600); color: #fff; cursor: pointer; font-size: 14px; }
  .pk-btns button:last-child { background: #fff; color: #555; border-color: #d0d7de; }
  .lv-form { display: flex; flex-direction: column; gap: 10px; margin: 8px 0; }
  .lv-form label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #555; }
  .lv-form input { padding: 9px; border: 1px solid #cfd8e3; border-radius: 9px; font-size: 15px; }
  .add-day { align-self: flex-start; border: 1px dashed var(--tl-600); background: #fff; color: var(--tl-600); border-radius: 9px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .draft { width: 100%; min-height: 90px; margin: 8px 0; padding: 10px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; font-family: inherit; resize: vertical; }
  .draft.tall { min-height: 260px; }
  .hint-s { color: var(--mut); font-size: 13px; line-height: 1.6; }
  .ap-card { background: #fff; border-radius: 12px; padding: 12px 14px; margin-top: 10px; font-size: 13px; }
  .ap-card .pk-btns { margin-top: 8px; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="card">
    <h1>桃園教會服事平台</h1>
    <p class="sub">服事查詢、請假、場地申請、新人跟進，一個帳號全搞定。用 Google 登入即可開始。</p>
    <div id="gBtn"></div>
    <div id="status">請點上方按鈕，用 Google 登入</div>
    <div id="uArea"></div>
    <div class="pub-links" id="pubLinks"></div>
    <p class="foot">登入只做身分驗證，資料來自服事排班試算表。<br>有問題請找全職同工。</p>
  </div>
  <div class="card" id="boardCard" style="display:none; margin-top:14px;">
    <h1 style="font-size:17px; margin:0 0 8px;"><i class="ti ti-calendar"></i> 未來三週服事表</h1>
    <div id="boardArea"></div>
    <p class="foot">登入後可看個人服事、線上請假。</p>
  </div>
</div>

<div class="wrap" id="app" style="display:none">
  <div class="hdr">
    <div class="d" id="hdrDate"></div>
    <h1 id="hdrName"></h1>
  </div>
  <div id="main"></div>
</div>

<div class="tabbar" id="tabbar" style="display:none"></div>

<div id="embed" style="display:none; position:fixed; inset:0; z-index:60; background:var(--bg); flex-direction:column;">
  <div class="embed-bar">
    <button onclick="closeEmbed()">← 返回平台</button>
    <span class="et" id="embedTitle"></span>
    <a id="embedExt" href="#" target="_blank">在新視窗開啟 ↗</a>
  </div>
  <iframe id="embedFrame" style="flex:1; border:none; width:100%;"></iframe>
</div>

<div id="picker" class="pk-overlay" style="display:none" onclick="if(event.target===this)closePicker()">
  <div class="pk-panel"><button class="pk-close" onclick="closePicker()">✕</button><div class="pk-body"></div></div>
</div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxavwu853Lejoco68BOJ1hEiH6MSrXMe2do171i8uUbGtQxDYBrLqk5U07H6Qas96rAWQ/exec';
  var CLIENT_ID = '1074124628352-lvvlgdr0vm4u35u48htt0ctg18n6ciju.apps.googleusercontent.com';
  var LAST_RES = null, ID_TOKEN = null, TAB = 'top', CARE_VIEW = 'member', TEAM_IDX = 0;
  var TOKEN = null;
  try { TOKEN = localStorage.getItem('svcToken'); } catch (e) { }
  // 工具與連結（要加連結改這裡即可；inApp=平台內頁面）
  var QUICK_LINKS = [
    { name: '借場地', icon: 'ti-door', url: 'venue.html' },
    { name: '新人跟進', icon: 'ti-user-plus', url: 'newcomer.html' }
  ];
  var TOOL_LINKS = [
    { name: '歌詞 PPT 系統', icon: 'ti-presentation', url: 'https://worshiplyrics.onrender.com' },
    { name: '節拍器疊片', icon: 'ti-music', url: 'https://daudi-w.github.io/metronome-tool/' },
    { name: '即時問答', icon: 'ti-bulb', url: 'https://church-quiz-26060378.web.app' },
    { name: '場地申請', icon: 'ti-door', url: 'venue.html' },
    { name: '新人跟進', icon: 'ti-user-plus', url: 'newcomer.html' }
  ];
  var WD_TODAY = ['日', '一', '二', '三', '四', '五', '六'];

  function initGoogleLogin() {
    if (!(window.google && google.accounts && google.accounts.id)) return setTimeout(initGoogleLogin, 100);
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onGoogleLogin, auto_select: false });
    google.accounts.id.renderButton(document.getElementById('gBtn'),
      { theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill' });
  }
  window.addEventListener('load', initGoogleLogin);
  window.addEventListener('load', loadBoard);
  window.addEventListener('load', function () {
    // 有平台 session 就直接登入（30 天免重登）；先用上次快取秒開，背景再刷新
    if (!TOKEN) return;
    var usedCache = false;
    try {
      var cached = localStorage.getItem('svcWhoami');
      if (cached) { applyResult(JSON.parse(cached), true); usedCache = true; }
    } catch (e) { }
    if (!usedCache) setStatus('⏳ 自動登入中…', false);
    api('whoami').then(function (res) {
      if (!res.ok) {
        TOKEN = null;
        try { localStorage.removeItem('svcToken'); localStorage.removeItem('svcWhoami'); } catch (e) { }
        if (usedCache) { location.reload(); return; } // 已用快取畫面 → 重載回登入頁
        setStatus('請點上方按鈕，用 Google 登入', false);
        return;
      }
      applyResult(res);
    }).catch(function () { if (!usedCache) setStatus('請點上方按鈕，用 Google 登入', false); });
  });
  window.addEventListener('load', function () {
    // 登入頁也放公開工具（外部連結，不需登入）
    document.getElementById('pubLinks').innerHTML = TOOL_LINKS
      .filter(function (l) { return l.url.indexOf('http') === 0; })
      .map(function (l) { return '<a href="' + l.url + '" target="_blank"><i class="ti ' + l.icon + '"></i> ' + l.name + '</a>'; })
      .join('');
  });

  // 看板渲染（登入頁 + 全教會服事表共用）：以「週」分組（第一堂週六＝週首）
  function boardHtml(slots) {
    var groups = [], cur = null;
    slots.forEach(function (s) {
      var d = boardDate(s.date);
      var off = (d.getDay() - 6 + 7) % 7;
      var ws = new Date(d); ws.setDate(d.getDate() - off);
      var key = ws.getMonth() + '-' + ws.getDate();
      if (!cur || cur.key !== key) { cur = { key: key, slots: [], min: s.date, max: s.date }; groups.push(cur); }
      cur.slots.push(s); cur.max = s.date;
    });
    var TAGS = ['本週', '下週', '第三週'];
    return groups.map(function (g, i) {
      var rng = g.min + (g.max !== g.min ? '–' + g.max : '');
      var wk = '<div class="wkh">' + (TAGS[i] || '第' + (i + 1) + '週') + ' <span class="rng">' + rng + '</span></div>';
      return wk + g.slots.map(function (s) {
        var lines = (s.items || []).map(function (it) {
          return '<div class="bd-line"><span class="rl">' + it.role + '</span>' + it.who + '</div>';
        }).join('');
        return '<div class="bd-slot"><div class="bd-d">' + s.date + '（' + s.weekday + '）' + (s.session || '') + brTag(s) +
          (s.special ? ' <span class="sp">⟨' + s.special + '⟩</span>' : '') + '</div>' + lines + '</div>';
      }).join('');
    }).join('');
  }

  function openChurchBoard() {
    var p = document.getElementById('picker'); p.style.display = 'flex';
    var b = p.querySelector('.pk-body'); b.innerHTML = '載入全教會服事表…';
    api('announcement', { weeks: 3 }).then(function (res) {
      if (!res.ok) { b.innerHTML = '⚠️ ' + (res.error || ''); return; }
      b.innerHTML = '<div class="pk-h"><i class="ti ti-calendar"></i> 全教會服事表（未來三週）</div>' +
        boardHtml(res.slots || []) +
        '<div class="pk-btns"><button onclick="closePicker()">關閉</button></div>';
    }).catch(function (e) { b.innerHTML = '⚠️ 連線失敗：' + e; });
  }

  function boardDate(md) {
    var p = String(md).split('/');
    var now = new Date();
    var d = new Date(now.getFullYear(), (parseInt(p[0], 10) || 1) - 1, parseInt(p[1], 10) || 1);
    if (d.getTime() - now.getTime() < -180 * 86400000) d.setFullYear(d.getFullYear() + 1); // 跨年
    return d;
  }

  function loadBoard() {
    fetch(SCRIPT_URL + '?board=1', { redirect: 'follow' })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (!res.ok || !res.slots || !res.slots.length) return;
        if (document.getElementById('app').style.display !== 'none') return; // 已登入就不顯示
        document.getElementById('boardArea').innerHTML = boardHtml(res.slots);
        document.getElementById('boardCard').style.display = 'block';
      }).catch(function () { });
  }

  function api(action, args) {
    return fetch(SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      body: JSON.stringify({ action: action, idToken: ID_TOKEN, sessionToken: TOKEN, args: args || {} })
    }).then(function (r) { return r.json(); });
  }

  function setStatus(msg, isErr) {
    var el = document.getElementById('status');
    el.textContent = msg; el.className = isErr ? 'err' : '';
  }

  function onGoogleLogin(response) {
    ID_TOKEN = response.credential;
    setStatus('⏳ 驗證身分中…', false);
    api('whoami').then(applyResult).catch(function () { setStatus('⚠️ 連線失敗，請稍後再試', true); });
  }
  function refresh() { api('whoami').then(applyResult).catch(function () { }); }

  function logout() {
    try { api('logout'); } catch (e) { }
    try { localStorage.removeItem('svcToken'); localStorage.removeItem('svcWhoami'); } catch (e) { }
    TOKEN = null;
    if (window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
    setTimeout(function () { location.reload(); }, 300);
  }

  function applyResult(res, fromCache) {
    if (!res.ok) { setStatus('⚠️ ' + (res.error || '驗證失敗'), true); return; }
    if (res.sessionToken) {
      TOKEN = res.sessionToken;
      try { localStorage.setItem('svcToken', TOKEN); } catch (e) { }
    }
    if (!fromCache && res.matched) {
      try {
        var cc = {}; for (var ck in res) { if (ck !== 'sessionToken') cc[ck] = res[ck]; }
        localStorage.setItem('svcWhoami', JSON.stringify(cc));
      } catch (e) { }
    }
    LAST_RES = res;
    if (!res.matched) { renderUnmatched(res); return; }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('tabbar').style.display = 'flex';
    var now = new Date();
    document.getElementById('hdrDate').textContent = (now.getMonth() + 1) + '月' + now.getDate() + '日（' + WD_TODAY[now.getDay()] + '）';
    document.getElementById('hdrName').textContent = '平安，' + (res.displayName || res.name || '');
    var tabs = [{ id: 'top', ic: 'ti-home', lb: '首頁' }, { id: 'home', ic: 'ti-calendar-heart', lb: '服事' }];
    if (res.isLeader) tabs.push({ id: 'care', ic: 'ti-users', lb: '牧養' });
    if (res.isTeamLead) tabs.push({ id: 'team', ic: 'ti-clipboard-list', lb: '班表' });
    tabs.push({ id: 'noti', ic: 'ti-bell', lb: '通知' });
    tabs.push({ id: 'me', ic: 'ti-user-circle', lb: '我的' });
    var tb = document.getElementById('tabbar');
    tb.innerHTML = tabs.map(function (t) {
      var bd = (t.id === 'noti' && res.unseenNoti) ? '<span class="nbadge">' + res.unseenNoti + '</span>' : '';
      return '<button data-tab="' + t.id + '">' + bd + '<i class="ti ' + t.ic + ' ic"></i>' + t.lb + '</button>';
    }).join('');
    tb.querySelectorAll('button').forEach(function (btn) {
      btn.addEventListener('click', function () { TAB = btn.getAttribute('data-tab'); renderTab(); });
    });
    if (!tabs.some(function (t) { return t.id === TAB; })) TAB = 'home';
    renderTab();
  }

  function renderTab() {
    var res = LAST_RES;
    document.querySelectorAll('.tabbar button').forEach(function (b) {
      b.className = (b.getAttribute('data-tab') === TAB) ? 'on' : '';
    });
    var h = '';
    if (TAB === 'top') h = renderTop(res);
    else if (TAB === 'home') h = renderHome(res);
    else if (TAB === 'care') h = renderCare(res);
    else if (TAB === 'team') h = renderTeamTab(res);
    else if (TAB === 'noti') h = renderNoti(res);
    else h = renderMe(res);
    document.getElementById('main').innerHTML = h;
    bindTabEvents();
    window.scrollTo(0, 0);
    if (TAB === 'noti' && res.unseenNoti) {
      api('notiSeen').catch(function () { });
      res.unseenNoti = 0;
      var bd = document.querySelector('.tabbar .nbadge');
      if (bd) bd.remove();
    }
  }

  function renderNoti(res) {
    var list = res.notifications || [];
    var h = '<div class="sec"><div class="sec-h">通知中心</div></div>';
    if (!list.length) return h + '<div class="empty">目前沒有通知。服事異動、新人分發、跟進提醒都會出現在這裡。</div>';
    var unseen = res.unseenNoti || 0;
    list.forEach(function (n, i) {
      var icon, body;
      if (n.action === '排入') {
        icon = '<i class="ti ti-circle-check" style="color:var(--tl-600)"></i> 新增';
        body = n.date + ' ' + String(n.session || '').replace(/^第/, '') + ' ' + n.role;
      } else if (n.action === '取消') {
        icon = '<i class="ti ti-circle-x" style="color:var(--red)"></i> 取消';
        body = n.date + ' ' + String(n.session || '').replace(/^第/, '') + ' ' + n.role;
      } else if (n.action === '新人分發') {
        icon = '<i class="ti ti-user-plus" style="color:var(--tl-600)"></i> 新人分發';
        body = (n.text || '') + ' <span class="go">點我前往新人跟進 →</span>';
      } else if (n.action === '請假通知') {
        icon = '<i class="ti ti-calendar-off" style="color:#b26a00"></i> 請假';
        body = n.text || '';
      } else if (n.action === '新人提醒') {
        icon = '<i class="ti ti-bell-ringing" style="color:#b26a00"></i> 跟進提醒';
        body = n.text || '';
      } else {
        icon = '<i class="ti ti-info-circle" style="color:var(--tl-600)"></i> ' + (n.action || '通知');
        body = n.text || (n.date ? n.date + '（' + n.weekday + '）' + n.session + '・' + n.role : '');
      }
      var clickable = (n.action === '新人分發' || n.action === '新人提醒');
      h += '<div class="nt' + (i < unseen ? ' new' : '') +
        (clickable ? '" style="cursor:pointer" data-act="open" data-name="新人跟進" data-href="newcomer.html' : '') +
        '"><b>' + icon + '</b>　' + body + '<div class="t">' + n.ts + '</div></div>';
    });
    return h;
  }

  function bindTabEvents() {
    document.querySelectorAll('[data-act]').forEach(function (el) {
      el.addEventListener('click', function () {
        var act = el.getAttribute('data-act');
        if (act === 'leave') openLeave();
        else if (act === 'announce') openAnnouncement();
        else if (act === 'review') openReview();
        else if (act === 'logout') logout();
        else if (act === 'sheet') window.open(LAST_RES.scheduleUrl, '_blank');
        else if (act === 'careview') { CARE_VIEW = el.getAttribute('data-v'); renderTab(); }
        else if (act === 'teamsel') { TEAM_IDX = Number(el.getAttribute('data-i')) || 0; renderTab(); }
        else if (act === 'gonoti') { TAB = 'noti'; renderTab(); }
        else if (act === 'board') { openChurchBoard(); }
        else if (act === 'open') {
          var href = el.getAttribute('data-href');
          if (href.indexOf('http') === 0) window.open(href, '_blank');
          else openEmbed(href, el.getAttribute('data-name') || '');
        }
      });
    });
  }

  function roleText(s) { return s.role + (s.instrument ? '（' + s.instrument + '）' : ''); }
  function dayOf(d) { return parseInt(String(d).split('/')[1], 10) || 0; }
  function monthOf(d) { return parseInt(String(d).split('/')[0], 10) || 0; }

  function dateBox(date, weekday, hot) {
    return '<div class="tl-date' + (hot ? ' hot' : '') + '"><b>' + dayOf(date) + '</b><span>' + weekday + '</span></div>';
  }

  function renderTimeline(entries, textFn) {
    if (!entries.length) return '<div class="empty">未來目前沒有排班。</div>';
    var h = '', lastMon = -1;
    entries.forEach(function (e) {
      var m = monthOf(e.date);
      if (m !== lastMon) { h += '<div class="wkh">' + m + ' 月</div>'; lastMon = m; }
      h += '<div class="tl-row">' + dateBox(e.date, e.weekday, !!e.hot) +
        '<div class="tl-txt">' + textFn(e) + '</div></div>';
    });
    return h;
  }

  function brTag(s) { return (s.branch && s.branch !== '桃園') ? '<span class="br-tag">' + s.branch + '</span>' : ''; }

  function heroHtml(list) {
    if (!list || !list.length) return '<div class="hero none">未來目前沒有排到你的服事，好好休息 😊</div>';
    var first = boardDate(list[0].date);
    var off = (first.getDay() - 6 + 7) % 7;
    var ws = new Date(first); ws.setDate(first.getDate() - off); ws.setHours(0, 0, 0, 0);
    var we = new Date(ws); we.setDate(ws.getDate() + 7);
    var group = list.filter(function (s) {
      var d = boardDate(s.date);
      return d >= ws && d < we;
    });
    var lines = group.map(function (s) {
      return '<div class="big" style="margin-top:8px;">' + s.date + '（' + s.weekday + '）' + (s.session || '') +
        brTag(s) + (s.changed ? '<span class="chg">異動</span>' : '') + '</div>' +
        '<div class="what">' + roleText(s) + '</div>';
    }).join('');
    return '<div class="hero"><div class="cap">你最近的服事' + (group.length > 1 ? '（' + group.length + ' 場）' : '') + '</div>' + lines + '</div>';
  }

  function renderTop(res) {
    var list = res.services || [];
    var h = heroHtml(list);
    if (res.unseenNoti) {
      h += '<div class="noti-line" data-act="gonoti"><i class="ti ti-bell-ringing"></i> 你有 ' + res.unseenNoti + ' 則新通知，點我查看</div>';
    }
    h += '<div class="sec"><div class="sec-h">快速申請</div></div><div class="qa qa-wrap">';
    h += '<button data-act="board"><i class="ti ti-calendar"></i> 全教會服事表</button>';
    h += '<button data-act="leave"><i class="ti ti-calendar-off"></i> 請假</button>';
    h += '<button data-act="announce"><i class="ti ti-speakerphone"></i> 公告</button>';
    QUICK_LINKS.forEach(function (l) {
      h += '<button data-act="open" data-href="' + l.url + '" data-name="' + l.name + '"><i class="ti ' + l.icon + '"></i> ' + l.name + '</button>';
    });
    h += '</div>';
    h += '<div class="sec"><div class="sec-h">工具與連結</div></div><div class="links">';
    TOOL_LINKS.forEach(function (l) {
      h += '<div class="lk" data-act="open" data-href="' + l.url + '" data-name="' + l.name + '"><i class="ti ' + l.icon + '"></i>' + l.name + '</div>';
    });
    h += '</div>';
    return h;
  }

  function renderHome(res) {
    var list = res.services || [];
    var h = heroHtml(list);
    h += '<div class="qa"><button data-act="leave"><i class="ti ti-calendar-off"></i> 我要請假</button><button data-act="board"><i class="ti ti-calendar"></i> 全教會服事表</button></div>';
    if (list.length > 1) {
      h += '<div class="sec"><div class="sec-h">之後的服事</div>' +
        renderTimeline(list.slice(1), function (e) {
          return (e.session || '') + '・' + roleText(e) + brTag(e) + (e.changed ? '<span class="chg">異動</span>' : '');
        }) + '</div>';
    }
    return h;
  }

  function renderCare(res) {
    var members = res.zoneMembers || [];
    var title = (res.scope === 'group') ? ('我的小組（' + (res.group || '—') + '）') : ('本區（' + (res.zone || '—') + '）');
    var withSvc = members.filter(function (m) { return m.services && m.services.length; }).length;
    var h = '<div class="sec"><div class="sec-h">' + title + '・共 ' + members.length + ' 位，' + withSvc + ' 位有排班</div></div>';
    h += '<div class="toggle"><button data-act="careview" data-v="member" class="' + (CARE_VIEW === 'member' ? 'on' : '') + '">依同工</button>' +
      '<button data-act="careview" data-v="date" class="' + (CARE_VIEW === 'date' ? 'on' : '') + '">依日期</button></div>';
    if (!members.length) return h + '<div class="empty">目前沒有可顯示的同工。</div>';
    if (CARE_VIEW === 'date') {
      var entries = [];
      members.forEach(function (m) {
        (m.services || []).forEach(function (s) {
          entries.push({ date: s.date, weekday: s.weekday, session: s.session, txt: m.displayName + '・' + roleText(s) });
        });
      });
      entries.sort(function (a, b) { return (monthOf(a.date) * 100 + dayOf(a.date)) - (monthOf(b.date) * 100 + dayOf(b.date)); });
      var byDate = {}, order = [];
      entries.forEach(function (e) {
        if (!byDate[e.date]) { byDate[e.date] = { weekday: e.weekday, lines: [] }; order.push(e.date); }
        byDate[e.date].lines.push((e.session ? e.session + '・' : '') + e.txt);
      });
      var h2 = '', lastMon = -1;
      order.forEach(function (d) {
        var m = monthOf(d);
        if (m !== lastMon) { h2 += '<div class="wkh">' + m + ' 月</div>'; lastMon = m; }
        h2 += '<div class="tl-row">' + dateBox(d, byDate[d].weekday, false) +
          '<div class="tl-txt">' + byDate[d].lines.join('<br>') + '</div></div>';
      });
      return h + (h2 || '<div class="empty">組員未來都沒有排班。</div>');
    }
    var groups = {}, order2 = [];
    members.forEach(function (m) {
      var g = m.group || '（未分組）';
      if (!groups[g]) { groups[g] = []; order2.push(g); }
      groups[g].push(m);
    });
    var hideHdr = (res.scope === 'group') || (order2.length === 1 && order2[0] === '（未分組）');
    order2.forEach(function (g) {
      if (!hideHdr) h += '<div class="grp-h"><i class="ti ti-map-pin"></i> ' + g + '（' + groups[g].length + '）</div>';
      groups[g].forEach(function (m) {
        var label = '<span class="nm">' + m.displayName + '</span>' + (m.shepherdRole ? '<span class="rl">' + m.shepherdRole + '</span>' : '');
        if (m.services && m.services.length) {
          var chips = m.services.map(function (s) {
            return '<span class="chip">' + s.date + ' ' + (s.session || '') + ' ' + roleText(s) + '</span>';
          }).join('');
          h += '<div class="mbr">' + label + '<div class="chips">' + chips + '</div></div>';
        } else {
          h += '<div class="mbr">' + label + ' <span class="none">未來無排班</span></div>';
        }
      });
    });
    return h;
  }

  function renderTeamTab(res) {
    var h = '';
    if (res.scheduleUrl) {
      h += '<div class="qa" style="margin-top:14px"><button data-act="sheet"><i class="ti ti-external-link"></i> 開試算表排班</button></div>' +
        '<div class="empty">排班調整請在試算表進行（找替補、自動排班都在那邊）。</div>';
    }
    var all = res.teamLeads || [];
    if (TEAM_IDX >= all.length) TEAM_IDX = 0;
    if (all.length > 1) {
      h += '<div class="toggle">' + all.map(function (tl, i) {
        return '<button data-act="teamsel" data-i="' + i + '" class="' + (i === TEAM_IDX ? 'on' : '') + '">' + (tl.teamName || '') + '</button>';
      }).join('') + '</div>';
    }
    (all.length ? [all[TEAM_IDX]] : []).forEach(function (tl) {
      var sched = tl.schedule || [];
      var gaps = 0;
      sched.forEach(function (d) { d.slots.forEach(function (s) { if (s.empty) gaps++; }); });
      h += '<div class="panel"><div class="ph"><i class="ti ti-tool"></i> ' + (tl.teamName || '') + '</div>' +
        '<div class="ps">未來 ' + sched.length + ' 個時段　' +
        (gaps ? '<span class="gap-badge">缺 ' + gaps + ' 個崗位</span>' : '<span class="ok-badge">皆有人</span>') + '</div>';
      var lastMon = -1;
      sched.forEach(function (d) {
        var m = monthOf(d.date);
        if (m !== lastMon) { h += '<div class="wkh">' + m + ' 月</div>'; lastMon = m; }
        var lines = '';
        d.slots.forEach(function (s) {
          var content;
          if (s.empty) content = '<span class="gap-badge">缺人</span>';
          else if (/主責|主領/.test(s.label) && s.names.length) {
            var lead = s.names[0], rest = s.names.slice(1);
            content = '<span class="lead-tag">主責</span>' + lead + (rest.length ? '　' + rest.join('、') : '');
          } else content = s.names.join('、');
          lines += '<div class="slot-line"><span class="lb">' + s.label + '</span>' + content + '</div>';
        });
        h += '<div class="tl-row">' + dateBox(d.date, d.weekday, false) +
          '<div class="tl-txt" style="flex:1">' + (d.session || '') + brTag(d) +
          (d.special ? ' <span class="sp">⟨' + d.special + '⟩</span>' : '') + lines + '</div></div>';
      });
      h += '</div>';
    });
    return h || '<div class="empty">你目前不是任何事工團的主責。</div>';
  }

  function renderMe(res) {
    var disp = res.displayName || res.name || '';
    var h = '<div class="me-card"><div class="me-top">' +
      '<div class="ava">' + (disp ? disp.charAt(0) : '?') + '</div>' +
      '<div><div class="nm">' + (res.name || '') + '</div><div class="em">' + (res.email || '') + '</div></div></div>';
    h += '<div class="kv"><span class="k">區 / 小組</span><span class="v">' + (res.zone || '—') + (res.group ? ' / ' + res.group : '') + '</span></div>';
    h += '<div class="kv"><span class="k">牧養身份</span><span class="v">' + (res.shepherdRole || '—') + '</span></div>';
    h += '<div class="kv"><span class="k">事工團</span><span class="v">' + (res.team || '—') + (res.teamRole ? '（' + res.teamRole + '）' : '') + '</span></div>';
    h += '<div class="kv"><span class="k">可服事崗位</span><span class="v">' + (res.skills || '—') + '</span></div>';
    h += '</div>';
    if (res.isAdmin) {
      h += '<button class="btn" data-act="review"><i class="ti ti-shield-check"></i> 帳號審核' +
        (res.pendingApplications ? '（' + res.pendingApplications + ' 筆待審）' : '（無待審）') + '</button>';
    }
    h += '<button class="btn line" data-act="logout">登出 / 換帳號</button>';
    return h;
  }

  /* ===== 查無身分 / 帳號申請 ===== */
  function renderUnmatched(res) {
    setStatus('✅ 登入成功', false);
    var u = document.getElementById('uArea');
    var h = '';
    if (res.applied && res.applyStatus === '待審') {
      h = '<div class="ap-card">⏳ <b>帳號審核中</b><br><span class="hint-s">你的申請已送出，核准後重新登入即可使用。</span></div>';
    } else if (res.applied && res.applyStatus === '婉拒') {
      h = '<div class="ap-card">⚠️ <b>申請未通過</b><br><span class="hint-s">請與全職同工聯繫確認，或重新申請。</span>' +
        '<div class="pk-btns"><button onclick="openApply()"><i class="ti ti-pencil"></i> 重新申請</button></div></div>';
    } else if (res.note) {
      h = '<div class="ap-card">⚠️ ' + res.note + '</div>';
    } else {
      h = '<div class="ap-card">👋 <b>你還不在名單中</b><br><span class="hint-s">送出申請，全職同工核准後就能使用。</span>' +
        '<div class="pk-btns"><button onclick="openApply()"><i class="ti ti-pencil"></i> 申請帳號</button></div></div>';
    }
    h += '<button class="btn line" onclick="logout()">登出 / 換帳號</button>';
    u.innerHTML = h;
  }

  function openApply() {
    var p = document.getElementById('picker'); p.style.display = 'flex';
    p.querySelector('.pk-body').innerHTML =
      '<div class="pk-h"><i class="ti ti-pencil"></i> 申請帳號</div>' +
      '<div class="hint-s">填寫後送出，全職同工核准後重新登入即可使用。</div>' +
      '<div class="lv-form">' +
      '<label>姓名（全名，必填）<input type="text" id="apName" placeholder="如：王小明"></label>' +
      '<label>區（選填）<input type="text" id="apZone" placeholder="如：沛璟區"></label>' +
      '<label>小組（選填）<input type="text" id="apGroup" placeholder="如：約書亞小組"></label>' +
      '<label>備註（選填）<input type="text" id="apNote" placeholder="如：敬拜團鼓手"></label></div>' +
      '<div class="pk-btns"><button onclick="submitApply()">送出申請</button><button onclick="closePicker()">取消</button></div>';
  }
  function submitApply() {
    var name = document.getElementById('apName').value.trim();
    if (!name) { alert('請填寫姓名（全名）'); return; }
    var args = {
      name: name,
      zone: document.getElementById('apZone').value.trim(),
      group: document.getElementById('apGroup').value.trim(),
      note: document.getElementById('apNote').value.trim()
    };
    var b = document.querySelector('#picker .pk-body'); b.innerHTML = '送出中…';
    api('apply', args).then(function (res) {
      if (!res.ok) { alert('申請失敗：' + (res.error || '')); openApply(); return; }
      b.innerHTML = '<div class="pk-h">✅ 申請已送出</div>' +
        '<div class="hint-s">核准後重新登入即可使用，請耐心等候。</div>' +
        '<div class="pk-btns"><button onclick="closePicker();refresh()">完成</button></div>';
    }).catch(function (e) { alert('連線失敗：' + e); });
  }

  /* ===== 審核 ===== */
  function openReview() {
    var p = document.getElementById('picker'); p.style.display = 'flex';
    var b = p.querySelector('.pk-body'); b.innerHTML = '讀取待審申請…';
    api('applications').then(function (res) {
      if (!res.ok) { b.innerHTML = '⚠️ ' + (res.error || '無法取得'); return; }
      var list = res.applications || [];
      var h = '<div class="pk-h"><i class="ti ti-shield-check"></i> 帳號審核（' + list.length + ' 筆待審）</div>';
      if (!list.length) h += '<div class="hint-s">目前沒有待審的申請。</div>';
      list.forEach(function (a) {
        h += '<div class="ap-card" style="border:1px solid var(--line)"><b>' + a.name + '</b>' +
          (a.zone ? '・' + a.zone : '') + (a.group ? '/' + a.group : '') + '<br>' +
          '<span class="hint-s">' + a.email + (a.note ? '・' + a.note : '') + '・' + a.appliedAt + '</span>' +
          '<div class="pk-btns">' +
          '<button class="rv-ok" data-row="' + a.row + '" data-name="' + a.name + '">✅ 核准</button>' +
          '<button class="rv-no" data-row="' + a.row + '" data-name="' + a.name + '">婉拒</button></div></div>';
      });
      b.innerHTML = h;
      b.querySelectorAll('.rv-ok').forEach(function (btn) {
        btn.addEventListener('click', function () { doReview(btn.getAttribute('data-row'), 'approve', btn.getAttribute('data-name')); });
      });
      b.querySelectorAll('.rv-no').forEach(function (btn) {
        btn.addEventListener('click', function () { doReview(btn.getAttribute('data-row'), 'reject', btn.getAttribute('data-name')); });
      });
    }).catch(function (e) { b.innerHTML = '⚠️ 連線失敗：' + e; });
  }
  function doReview(row, decision, name) {
    if (decision === 'reject' && !confirm('確定婉拒「' + name + '」的申請？')) return;
    var b = document.querySelector('#picker .pk-body'); if (b) b.innerHTML = '處理中…';
    api('review', { row: Number(row), decision: decision }).then(function (res) {
      if (!res.ok) { alert('處理失敗：' + (res.error || '')); }
      openReview();
    }).catch(function (e) { alert('連線失敗：' + e); });
  }

  /* ===== 請假 ===== */
  function openLeave() {
    var p = document.getElementById('picker'); p.style.display = 'flex';
    var whoSel = '';
    var res = LAST_RES;
    if (res && res.isLeader && res.zoneMembers && res.zoneMembers.length) {
      whoSel = '<label>幫誰請假 <select id="lvWho">' +
        '<option value="">我自己</option>' +
        res.zoneMembers.map(function (m) {
          return '<option value="' + m.displayName + '">' + m.displayName + (m.group ? '（' + m.group + '）' : '') + '</option>';
        }).join('') + '</select></label>';
    }
    p.querySelector('.pk-body').innerHTML =
      '<div class="pk-h"><i class="ti ti-calendar-off"></i> 我要請假</div>' +
      '<div class="lv-form">' + whoSel + '<div id="lvDates"><label>日期 <input type="date" class="lvDate"></label></div>' +
      '<button type="button" class="add-day" onclick="addLeaveDate()">＋ 再加一天</button>' +
      '<label>原因（選填）<input type="text" id="lvReason" placeholder="如：出差、家庭因素"></label></div>' +
      '<div class="pk-btns"><button onclick="submitLeave()">送出</button><button onclick="closePicker()">取消</button></div>';
  }
  function addLeaveDate() {
    var wrap = document.getElementById('lvDates');
    var label = document.createElement('label');
    label.innerHTML = '日期 <input type="date" class="lvDate">';
    wrap.appendChild(label);
  }
  function submitLeave() {
    var mds = [];
    document.querySelectorAll('#picker .lvDate').forEach(function (inp) {
      if (!inp.value) return;
      var d = new Date(inp.value);
      var md = (d.getMonth() + 1) + '/' + d.getDate();
      if (mds.indexOf(md) === -1) mds.push(md);
    });
    if (!mds.length) { alert('請先選日期'); return; }
    var reason = document.getElementById('lvReason').value;
    var whoEl = document.getElementById('lvWho');
    var forName = whoEl ? whoEl.value : '';
    var b = document.querySelector('#picker .pk-body'); b.innerHTML = '送出中…';
    api('leave', { dates: mds, reason: reason, forName: forName }).then(function (res) {
      if (!res.ok) { alert('請假失敗：' + (res.error || '')); openLeave(); return; }
      var hint = res.proxy
        ? '已幫「' + res.target + '」登記，系統會通知本人，排班自動避開。'
        : '排班時會自動避開你，系統已通知你的小組長。';
      b.innerHTML = '<div class="pk-h">✅ 已登記請假（' + mds.join('、') + '）</div>' +
        '<div class="hint-s">' + hint + '</div>' +
        '<textarea class="draft" readonly>' + res.draft + '</textarea>' +
        '<div class="pk-btns"><button onclick="copyDraft(this)"><i class="ti ti-copy"></i> 複製</button><button onclick="closePicker();refresh()">完成</button></div>';
    }).catch(function (e) { alert('連線失敗：' + e); });
  }

  /* ===== 公告 ===== */
  function openAnnouncement() {
    var p = document.getElementById('picker'); p.style.display = 'flex';
    var b = p.querySelector('.pk-body'); b.innerHTML = '產生公告中…';
    api('announcement', { weeks: 1 }).then(function (res) {
      if (!res.ok) { b.innerHTML = '⚠️ ' + (res.error || ''); return; }
      var lines = [];
      (res.slots || []).forEach(function (s) {
        lines.push('📅 ' + s.date + '（' + s.weekday + '）' + s.session + (s.special ? ' [' + s.special + ']' : ''));
        s.items.forEach(function (it) { lines.push('・' + it.role + '：' + it.who); });
        lines.push('');
      });
      var text = lines.join('\n') || '（未來沒有排班資料）';
      b.innerHTML = '<div class="pk-h"><i class="ti ti-speakerphone"></i> 未來一週服事公告</div>' +
        '<div class="hint-s">可直接複製貼到 LINE。</div>' +
        '<textarea class="draft tall" readonly>' + text + '</textarea>' +
        '<div class="pk-btns"><button onclick="copyDraft(this)"><i class="ti ti-copy"></i> 複製</button><button onclick="closePicker()">關閉</button></div>';
    }).catch(function (e) { b.innerHTML = '⚠️ 連線失敗：' + e; });
  }

  function copyDraft(btn) {
    var ta = document.querySelector('#picker .draft'); if (!ta) return;
    ta.select();
    try { navigator.clipboard.writeText(ta.value); } catch (e) { try { document.execCommand('copy'); } catch (e2) { } }
    btn.textContent = '✅ 已複製';
  }
  function closePicker() { document.getElementById('picker').style.display = 'none'; }
  function openEmbed(url, title) {
    document.getElementById('embedTitle').textContent = title || '';
    document.getElementById('embedExt').href = url;
    document.getElementById('embedFrame').src = url;
    document.getElementById('embed').style.display = 'flex';
  }
  function closeEmbed() {
    document.getElementById('embed').style.display = 'none';
    document.getElementById('embedFrame').src = 'about:blank';
  }
</script>
</body>
</html>
