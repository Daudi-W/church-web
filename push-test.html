<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="推播測試">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>推播測試</title>
<style>
  body { font-family: -apple-system, "PingFang TC", sans-serif; max-width: 480px; margin: 0 auto; padding: 24px; line-height: 1.7; color: #1a1a1a; }
  h1 { font-size: 20px; }
  button { font-size: 17px; padding: 12px 18px; border: 0; border-radius: 12px; background: #0F6E56; color: #fff; width: 100%; margin: 10px 0; }
  button:disabled { background: #999; }
  .log { background: #f4f4f5; border-radius: 10px; padding: 12px; font-size: 13px; white-space: pre-wrap; word-break: break-all; margin-top: 12px; }
  .step { color: #666; font-size: 14px; }
  ol { padding-left: 20px; }
</style>
</head>
<body>
<h1>🔔 服事平台推播測試（P0）</h1>
<p class="step">用途：驗證「裝置 → 推播服務 → 手機跳通知」整條鏈路。<br>
iPhone 請先用 Safari「分享 → 加入主畫面」，再從主畫面圖示打開本頁。</p>

<ol class="step">
  <li>按下面的按鈕，允許通知</li>
  <li>看到「✅ 已訂閱」後，告訴 Pei Ching</li>
  <li>由後端觸發測試 → 你手機應跳出通知</li>
</ol>

<button id="btn">開啟通知並訂閱</button>
<div class="log" id="log">尚未開始。</div>

<script>
  // VAPID 公鑰（可公開）
  var VAPID_PUBLIC = 'BM8nIgdXT6ab7HUW1-BRiwjPOdOYHvr5GslQxVmCn7dcTxYAybHPLTp_WPUddMmOaUXDeArnYXRHMJ6bpMpJN7E';
  // ⚠️ 部署 Render 後把這行換成你的服務網址（結尾不要加斜線）
  var PUSH_SERVICE = 'https://church-push.onrender.com';

  var logEl = document.getElementById('log');
  function log(s) { logEl.textContent = s; }

  function urlB64ToUint8(base64) {
    var pad = '='.repeat((4 - base64.length % 4) % 4);
    var b64 = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
    var raw = atob(b64), arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  document.getElementById('btn').addEventListener('click', function () {
    var btn = this; btn.disabled = true;
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      log('⚠️ 這個瀏覽器/環境不支援推播。iPhone 請從「主畫面」的圖示打開本頁。');
      btn.disabled = false; return;
    }
    log('註冊 Service Worker…');
    navigator.serviceWorker.register('sw.js').then(function () {
      return navigator.serviceWorker.ready;
    }).then(function (reg) {
      log('要求通知權限…');
      return Notification.requestPermission().then(function (p) {
        if (p !== 'granted') throw new Error('你拒絕了通知權限');
        log('訂閱推播…');
        return reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8(VAPID_PUBLIC)
        });
      });
    }).then(function (sub) {
      log('送出訂閱到推播服務…');
      return fetch(PUSH_SERVICE + '/subscribe', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription: sub })
      }).then(function (r) { return r.json(); }).then(function (res) {
        log('✅ 已訂閱成功！目前服務記憶體有 ' + (res.count || '?') + ' 筆訂閱。\n\n現在告訴 Pei Ching，由後端觸發測試推播。');
      });
    }).catch(function (e) {
      log('❌ 失敗：' + (e && e.message ? e.message : e));
      btn.disabled = false;
    });
  });
</script>
</body>
</html>
